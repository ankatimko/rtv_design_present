<style>
  html, body { background: #F4F5F9; }
  /* Wide-page edge stripes (matches base.sass) */
  @media (min-width: 1305px) {
    body::before, body::after {
      content: ""; position: fixed; top: 0; bottom: 0; width: 80px;
      background: #E6ECF6; z-index: -1; pointer-events: none;
    }
    body::before { left: 0;  box-shadow: var(--sh-stripe-l); }
    body::after  { right: 0; box-shadow: var(--sh-stripe-r); }
  }
  #root { isolation: isolate; }
  /* Smooth scrollbar on the dropdown menus */
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-thumb { background: rgba(138,143,163,0.35); border-radius: 4px; }
  *::-webkit-scrollbar-thumb:hover { background: rgba(138,143,163,0.55); }
</style>
